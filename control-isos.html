<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de ISOs · Home Delivery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   BASE TOKENS
═══════════════════════════════════════════════ */
:root{
  --bg:#EAF1FB;--surface:#FFFFFF;--ink:#16202E;--ink-soft:#4A5568;--line:#C9D9ED;
  --primary:#0058A3;--primary-dark:#003E73;--accent:#FFDB00;
  --danger:#D7263D;--danger-bg:#FCE9EB;--warning:#B9790A;--warning-bg:#FDF1DD;
  --success:#1F8A4C;--success-bg:#E7F5EC;
  --shadow:0 1px 2px rgba(0,62,115,.07),0 4px 14px rgba(0,62,115,.08);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
h1,h2,h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.01em;}

/* ═══════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════ */
header.app-header{
  background:var(--primary);background-image:linear-gradient(135deg,#0058A3 0%,#003E73 100%);
  color:#fff;position:sticky;top:0;z-index:30;border-bottom:4px solid var(--accent);
}
.header-inner{max-width:1400px;margin:0 auto;padding:14px 20px 12px;display:flex;align-items:center;justify-content:flex-start;gap:16px;flex-wrap:wrap;}
.header-logo{flex:none;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:9px;padding:5px 10px;box-shadow:0 2px 8px rgba(0,0,0,.18);}
.header-logo img{display:block;height:36px;width:auto;}
.header-logo.logo-prevencion{padding:6px 12px;}
.header-logo.logo-prevencion img{height:130px;width:auto;}
.brand{flex:1;min-width:220px;}
.header-right{flex:none;display:flex;align-items:center;gap:12px;margin-left:auto;}
.sync-status{font-size:11px;font-weight:700;letter-spacing:.03em;color:#BBD6EF;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:4px 10px;white-space:nowrap;transition:color .2s ease;}
.brand .tag{background:var(--accent);color:var(--ink);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.08em;padding:3px 8px;border-radius:4px;text-transform:uppercase;}
.brand h1{margin:4px 0 0;font-size:26px;text-transform:uppercase;letter-spacing:.02em;line-height:1;}
.brand .sub{font-size:12px;color:#BBD6EF;margin-top:2px;}

/* ═══════════════════════════════════════════════
   TOOLBAR
═══════════════════════════════════════════════ */
.toolbar{max-width:1400px;margin:0 auto;padding:14px 20px 0;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.search-box{position:relative;flex:1;min-width:200px;max-width:360px;}
.search-box input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:var(--surface);font-family:'Inter',sans-serif;}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.45;}
.btn{border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:transform .08s ease,background .15s ease;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-outline{background:var(--surface);color:var(--ink);border:1px solid var(--line);}
.btn-outline:hover{border-color:#B7BEC6;}
.btn-dashboard{background:var(--primary-dark);color:#fff;border:1px solid #002E55;}
.btn-dashboard:hover{background:#002E55;}
.btn-danger-text{background:transparent;color:var(--danger);padding:6px 4px;font-size:13px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;}
.spacer{flex:1;}
.toggle-lbl{font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;}

/* ═══════════════════════════════════════════════
   CHIPS ETAPA
═══════════════════════════════════════════════ */
.stagechips{max-width:1400px;margin:0 auto;padding:14px 20px 6px;display:flex;gap:10px;flex-wrap:wrap;}
.chip{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:8px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:var(--shadow);min-width:118px;}
.chip .cnum{width:24px;height:24px;border-radius:50%;background:var(--ink);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex:none;}
.chip .count{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;line-height:1;}
.chip .lbl{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}

/* ═══════════════════════════════════════════════
   BOARD
═══════════════════════════════════════════════ */
.board-wrap{max-width:1400px;margin:0 auto;padding:10px 20px 40px;}
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;}
.column{background:#DCE8F5;border-radius:12px;min-width:268px;max-width:268px;flex:none;display:flex;flex-direction:column;max-height:calc(100vh - 250px);}
.col-head{padding:12px 14px 10px;border-bottom:1px solid #C5D7EC;display:flex;align-items:center;gap:8px;}
.col-head .cnum{width:22px;height:22px;border-radius:5px;background:var(--primary);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex:none;}
.col-head .name{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;flex:1;}
.col-head .cnt{font-family:'IBM Plex Mono',monospace;font-size:12px;background:#fff;border-radius:10px;padding:1px 8px;color:var(--ink-soft);}
.col-head.anden{position:relative;}
.col-head.anden::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:3px;background:repeating-linear-gradient(45deg,var(--accent) 0 8px,var(--primary) 8px 16px);}
.col-body{padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;}
.col-empty{font-size:12px;color:#5E7896;text-align:center;padding:18px 8px;}

.card{background:var(--surface);border-radius:9px;padding:10px 11px;box-shadow:var(--shadow);cursor:pointer;border-left:4px solid var(--success);transition:transform .08s ease;}
.card:hover{transform:translateY(-1px);}
.card.urg-warning{border-left-color:var(--warning);}
.card.urg-danger{border-left-color:var(--danger);}
.card .top-row{display:flex;justify-content:space-between;align-items:baseline;gap:6px;}
.card .code{font-size:12px;font-weight:600;color:var(--primary-dark);font-family:'IBM Plex Mono',monospace;}
.card .age{font-size:10.5px;color:#9AA0A8;}
.card .prod{font-size:13px;font-weight:600;margin-top:3px;line-height:1.25;}
.card .meta{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}
.card .meta b{color:var(--ink);font-weight:600;}
.card .tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.tag-pill{font-size:10px;padding:1px 6px;border-radius:8px;background:#E4ECF6;color:var(--ink-soft);font-weight:500;}

/* ═══════════════════════════════════════════════
   MODAL OPERATIVO
═══════════════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(16,22,32,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:16px;}
.overlay.show{display:flex;}
.modal{background:var(--surface);border-radius:14px;max-width:530px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:pop .15s ease;}
@keyframes pop{from{opacity:0;transform:scale(.97) translateY(6px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-head{padding:18px 20px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.modal-head h2{margin:0;font-size:20px;text-transform:uppercase;}
.modal-head .stage-tag{font-size:11px;color:var(--ink-soft);margin-top:2px;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-soft);line-height:1;padding:2px;}
.modal-body{padding:16px 20px 6px;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--primary-dark);border-bottom:1px solid var(--line);padding-bottom:6px;margin:14px 0 10px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em;}
.field input,.field select,.field textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:7px;font-size:14px;font-family:'Inter',sans-serif;background:#fff;color:var(--ink);text-transform:uppercase;}
.field textarea{resize:vertical;min-height:54px;}
.req::after{content:" *";color:var(--danger);}
.modal-foot{padding:14px 20px 20px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--line);margin-top:10px;flex-wrap:wrap;}
.modal-foot .left-actions{margin-right:auto;}
.datos-actuales{background:#F7F8F7;border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:4px;}
.da-row{display:flex;gap:6px;font-size:12.5px;padding:2px 0;}
.da-key{color:var(--ink-soft);min-width:120px;flex:none;}
.da-val{font-weight:600;color:var(--ink);}
.timeline{padding:14px 20px 4px;}
.timeline h3{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin:0 0 10px;}
.tl-item{display:flex;gap:10px;margin-bottom:10px;}
.tl-dot{width:9px;height:9px;border-radius:50%;background:var(--primary);margin-top:5px;flex:none;}
.tl-item.is-anulado .tl-dot{background:var(--danger);}
.tl-content{font-size:13px;}
.tl-content .stg{font-weight:600;}
.tl-content .when{font-size:11.5px;color:#9AA0A8;}
.tl-content .notas{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}

/* ═══════════════════════════════════════════════
   PIN OVERLAY
═══════════════════════════════════════════════ */
.pin-overlay{
  position:fixed;inset:0;background:rgba(0,20,40,.92);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:80;
}
.pin-overlay.show{display:flex;}
.pin-box{
  background:#002C52;border:1px solid #0A4A7D;border-radius:18px;
  padding:32px 28px 28px;width:320px;text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,.6);animation:pop .18s ease;
}
.pin-box .lock-icon{font-size:36px;margin-bottom:12px;display:block;}
.pin-box h2{margin:0 0 4px;color:#fff;font-size:22px;text-transform:uppercase;}
.pin-box p{margin:0 0 20px;font-size:13px;color:#82A8CE;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:20px;}
.pin-dot{
  width:14px;height:14px;border-radius:50%;border:2px solid #0A4A7D;
  background:transparent;transition:background .15s ease,border-color .15s ease;
}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.pin-dot.error{background:var(--danger);border-color:var(--danger);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.pin-key{
  background:#003E73;border:1px solid #0A4A7D;border-radius:10px;
  color:#fff;font-size:20px;font-weight:600;padding:14px 0;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;transition:background .1s ease,transform .08s ease;
}
.pin-key:hover{background:#0058A3;}
.pin-key:active{transform:scale(.94);background:#002744;}
.pin-key.del{font-size:15px;color:#82A8CE;}
.pin-key.empty{background:transparent;border-color:transparent;cursor:default;}
.pin-cancel{
  background:transparent;border:1px solid #0A4A7D;border-radius:8px;
  color:#82A8CE;font-size:13px;font-weight:600;padding:8px 20px;cursor:pointer;
  font-family:'Inter',sans-serif;
}
.pin-cancel:hover{color:#fff;border-color:#5588B8;}
.pin-error-msg{font-size:12px;color:var(--danger);min-height:16px;margin-bottom:4px;}

/* ═══════════════════════════════════════════════
   DASHBOARD FULL-SCREEN
═══════════════════════════════════════════════ */
.db-overlay{
  position:fixed;inset:0;background:#FFFFFF;display:none;flex-direction:column;
  z-index:70;overflow-y:auto;
}
.db-overlay.show{display:flex;}

.db-header{
  background:linear-gradient(135deg,#0058A3 0%,#002C52 100%);
  border-bottom:3px solid var(--accent);padding:16px 28px;
  display:flex;align-items:center;justify-content:flex-start;flex-wrap:wrap;gap:16px;
  position:sticky;top:0;z-index:5;
}
.db-header .db-brand{display:flex;align-items:center;gap:12px;flex:1;min-width:220px;}
.db-header .db-icon{font-size:26px;}
.db-header h2{margin:0;font-size:24px;text-transform:uppercase;color:#fff;letter-spacing:.04em;}
.db-header .db-sub{font-size:12px;color:#82A8CE;margin-top:1px;}
.db-right{flex:none;display:flex;align-items:center;gap:12px;margin-left:auto;}
.db-header .db-meta{display:flex;align-items:center;gap:16px;}
.db-header .db-time{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#BBD6EF;}
.db-close{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;
  color:#fff;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:'Inter',sans-serif;
}
.db-close:hover{background:rgba(255,255,255,.12);}

.db-body{flex:1;padding:24px 28px 40px;max-width:1400px;margin:0 auto;width:100%;}

/* KPI globales */
.db-global{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px;}
.kpi-global{
  background:#FFFFFF;border:1px solid var(--line);
  border-radius:12px;padding:18px 20px;box-shadow:var(--shadow);
}
.kpi-global .kg-label{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.kpi-global .kg-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:42px;line-height:1;color:var(--ink);}
.kpi-global .kg-val.c-accent{color:var(--primary);}
.kpi-global .kg-val.c-danger{color:var(--danger);}
.kpi-global .kg-val.c-success{color:var(--success);}
.kpi-global .kg-val.c-warning{color:var(--warning);}
.kpi-global .kg-sub{font-size:12px;color:var(--ink-soft);margin-top:6px;}

/* Barra de flujo */
.db-flow-section{margin-bottom:28px;}
.db-section-label{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-family:'Inter',sans-serif;font-weight:700;}
.flow-bar{display:flex;height:40px;border-radius:8px;overflow:hidden;gap:2px;}
.flow-seg{
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;transition:flex .4s ease;
  min-width:0;overflow:hidden;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;
  letter-spacing:.03em;
}
.flow-seg.s1{background:#1A5EA8;}
.flow-seg.s2{background:#1269C0;}
.flow-seg.s3{background:#2978D4;}
.flow-seg.s4{background:#3B87E0;}
.flow-seg.s5{background:#1F8A4C;}
.flow-seg.empty{background:#EAF1FB;color:#9CB3CB;font-style:italic;}
.flow-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;}
.flow-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-soft);}
.flow-leg-dot{width:8px;height:8px;border-radius:50%;}

/* KPI por etapa */
.db-stages{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:28px;}
.kpi-stage{
  background:#FFFFFF;border:1px solid var(--line);border-radius:12px;padding:16px 18px;
  display:flex;flex-direction:column;gap:10px;box-shadow:var(--shadow);
}
.kpi-stage.has-danger{border-color:var(--danger);background:var(--danger-bg);}
.kpi-stage.has-warning{border-color:var(--warning);background:var(--warning-bg);}
.ks-head{display:flex;align-items:center;gap:8px;}
.ks-num{
  width:26px;height:26px;border-radius:6px;background:var(--primary);
  color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;
  display:flex;align-items:center;justify-content:center;flex:none;
}
.ks-name{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);}
.ks-total{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:38px;color:var(--primary-dark);line-height:1;}
.ks-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ks-met{background:var(--bg);border-radius:7px;padding:8px 10px;}
.ks-met .m-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:var(--ink);line-height:1;}
.ks-met .m-val.c-danger{color:var(--danger);}
.ks-met .m-val.c-warning{color:var(--warning);}
.ks-met .m-val.c-success{color:var(--success);}
.ks-met .m-lbl{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-top:3px;}
.ks-avgbar{height:4px;border-radius:2px;background:var(--line);margin-top:4px;overflow:hidden;}
.ks-avgbar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .4s ease;}

/* Bottom panels */
.db-bottom{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.db-panel{background:#FFFFFF;border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:var(--shadow);}
.db-panel h3{margin:0 0 14px;font-size:14px;text-transform:uppercase;color:var(--primary-dark);letter-spacing:.04em;}
.motivo-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.motivo-label{font-size:12px;color:var(--ink-soft);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.motivo-bar-wrap{width:100px;height:6px;background:var(--line);border-radius:3px;flex:none;}
.motivo-bar{height:100%;border-radius:3px;background:var(--accent);}
.motivo-cnt{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink);flex:none;width:24px;text-align:right;}
.conductor-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px;}
.conductor-name{color:var(--ink-soft);flex:1;}
.conductor-badge{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--primary);}
.db-empty-msg{font-size:12px;color:#9CB3CB;font-style:italic;}

/* dashboard search */
.db-search-row{display:flex;gap:10px;align-items:center;}
.db-search-box{position:relative;flex:1;max-width:440px;}
.db-search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);}
.db-search-box input{
  width:100%;padding:11px 14px 11px 36px;background:#FFFFFF;border:1px solid var(--line);
  border-radius:9px;color:var(--ink);font-size:14px;font-family:'Inter',sans-serif;outline:none;
}
.db-search-box input::placeholder{color:#9CB3CB;}
.db-search-box input:focus{border-color:var(--primary);}
.db-search-none{font-size:13px;color:var(--ink-soft);padding:12px 0;font-style:italic;}
.db-search-card{
  display:flex;justify-content:space-between;align-items:flex-start;gap:14px;
  background:#FFFFFF;border:1px solid var(--line);border-radius:10px;padding:14px 16px;
  margin-top:10px;box-shadow:var(--shadow);
}
.dsc-left{border-left:4px solid #1A5EA8;padding-left:12px;flex:1;}
.dsc-code{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.dsc-stage{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dsc-bubble{width:22px;height:22px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:#fff;flex:none;}
.dsc-stagename{font-size:13px;font-weight:700;color:var(--ink);}
.dsc-urg{font-size:11px;color:var(--warning);font-weight:600;}
.dsc-extras{font-size:11.5px;color:var(--ink-soft);margin-top:5px;}
.dsc-right{text-align:right;flex:none;}
.dsc-time-lbl{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
.dsc-time-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:var(--primary);line-height:1.1;}
.dsc-history{font-size:11px;color:#9CB3CB;margin-top:3px;}

/* Historial completo (lista desplegable) */
.db-history-wrap{margin-top:22px;}
details.db-history{background:#FFFFFF;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
details.db-history summary{list-style:none;cursor:pointer;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:700;color:var(--primary-dark);text-transform:uppercase;letter-spacing:.04em;}
details.db-history summary::-webkit-details-marker{display:none;}
details.db-history summary .dh-summary-left{display:flex;align-items:center;gap:10px;}
details.db-history summary .dh-count{font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--bg);padding:2px 10px;border-radius:10px;color:var(--ink-soft);text-transform:none;letter-spacing:0;font-weight:600;}
details.db-history summary .dh-chevron{transition:transform .2s ease;font-size:12px;color:var(--ink-soft);}
details.db-history[open] summary .dh-chevron{transform:rotate(180deg);}
.db-history-inner{padding:0 18px 18px;border-top:1px solid var(--line);}
.db-history-filter{margin:14px 0;}
.db-history-filter input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--line);background:#FFFFFF;color:var(--ink);font-size:13px;font-family:'Inter',sans-serif;}
.db-history-filter input::placeholder{color:#9CB3CB;}
.db-history-list{max-height:380px;overflow-y:auto;margin-top:4px;border-top:1px solid var(--line);}
.dh-head-row{display:flex;gap:10px;padding:8px 6px;font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--line);position:sticky;top:0;background:#FFFFFF;}
.dh-row{display:flex;gap:10px;align-items:center;padding:9px 6px;font-size:12.5px;border-bottom:1px solid var(--line);}
.dh-row:hover{background:var(--bg);}
.dh-col-code{flex:1.3;min-width:0;color:var(--ink);font-weight:600;}
.dh-col-code .dh-isoaso{display:block;font-size:10.5px;color:var(--ink-soft);font-weight:400;}
.dh-col-date{flex:1;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;font-size:11.5px;}
.dh-col-stage{flex:1.3;display:flex;align-items:center;gap:6px;}
.dh-badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:9px;color:#fff;white-space:nowrap;}
.dh-empty{font-size:12px;color:#9CB3CB;font-style:italic;padding:16px 6px;text-align:center;}

@media(max-width:700px){
  .db-bottom{grid-template-columns:1fr;}
  .db-global{grid-template-columns:repeat(2,1fr);}
  .db-stages{grid-template-columns:repeat(2,1fr);}
  .db-body{padding:16px;}
}

/* ═══════════════════════════════════════════════
   TOAST / LOADING
═══════════════════════════════════════════════ */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:all .2s ease;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.loading-bar{height:3px;background:linear-gradient(90deg,var(--accent),var(--primary));width:0%;transition:width .3s;}
@media(max-width:640px){.brand h1{font-size:20px;}.column{min-width:84vw;max-width:84vw;}.header-logo.logo-prevencion img{height:80px;}}
</style>
</head>

<script>
(function(){
/* ══════════════════════════════════════════════

const DASHBOARD_PIN = '2108'; // ← cambiar aquí el PIN del dashboard


const STAGES=[
  {key:'llegada',  num:1,label:'Llegada',       full:'Llegada del ISO/ASO'},
  {key:'recepcion',num:2,label:'Recepción',      full:'Recepción · Log. Inversa'},
  {key:'bodega',   num:3,label:'Bodega rechazo', full:'Reagendado · En rack'},
  {key:'retiro',   num:4,label:'Retiro',         full:'Retiro de bodega'},
  {key:'anden',    num:5,label:'Andén',          full:'Andén · Vehículo asignado'},
];
const FINAL_STAGE_KEY = STAGES[STAGES.length-1].key;

const FIELDS={
  llegada:[
    {key:'isoAso',           label:'ISO / ASO',                 type:'text'},
    {key:'transportista',    label:'Empresa transportista',     type:'text'},
    {key:'lpn',              label:'Cantidad LPN',              type:'text'},
    {key:'motivo',           label:'Motivo de no entrega',      type:'select',
      options:['','CLIENTE AUSENTE','DIRECCIÓN INCORRECTA','RECHAZO DEL CLIENTE','ACCESO RESTRINGIDO','PRODUCTO DAÑADO EN RUTA','OTRO']},
    {key:'conductorOrigen',  label:'Conductor que retorna el ISO',type:'text'},
    {key:'notas',            label:'Notas',                     type:'textarea'},
  ],
  recepcion:[
    {key:'estadoProducto',   label:'Estado del producto',       type:'select',options:['','CONFORME','DAÑADO','INCOMPLETO']},
    {key:'notas',            label:'Notas de recepción',        type:'textarea'},
  ],
  bodega:[
    {key:'rack',             label:'Rack / Ubicación zona repisas',type:'text',required:true},
    {key:'notas',            label:'Notas',                     type:'textarea'},
  ],
  retiro:[{key:'notas',      label:'Notas de retiro',           type:'textarea'}],
  anden:[
    {key:'numeroAnden',      label:'N° de andén',               type:'text'},
    {key:'vehAsignado',      label:'Veh asignado',              type:'text'},
    {key:'notas',            label:'Notas',                     type:'textarea'},
  ],
};
const FIELD_LABELS={
  isoAso:'ISO / ASO',transportista:'Empresa transportista',lpn:'Cantidad LPN',motivo:'Motivo',
  conductorOrigen:'Conductor origen',notas:'Notas',estadoProducto:'Estado producto',
  rack:'Rack / Ubicación zona repisas',numeroAnden:'N° andén',vehAsignado:'Veh asignado',
};
// Etiqueta del campo "responsable" según la etapa que se está registrando
const RESPONSABLE_LABELS={
  llegada:'Quien recepciona en LI',
  recepcion:'Quien recepciona',
  bodega:'Quien recepciona',
  retiro:'Quien Retira',
  anden:'Quien asigna andén',
};
const URGENCY_HOURS={
  llegada:{warning:4,danger:24},recepcion:{warning:24,danger:48},
  bodega:{warning:48,danger:96},retiro:{warning:4,danger:12},
};
const LS_KEY='ctrl-isos-v2';

let DATA={meta:{nextSeq:1},isos:{}};
let filterText='',showEntregados=false,showAnulados=false,modalOpen=false;
let dbUnlocked=false;
let dbClockTimer=null;
let dbHistoryOpen=false,dbHistoryFilter='';

/* ── storage ── */
function setLoading(p){document.getElementById('loadingBar').style.width=p+'%';}
function loadData(){
  try{
    const r=localStorage.getItem(LS_KEY);
    if(r){
      const parsed=JSON.parse(r);
      // Migración: la antigua etapa 6 "entregado" se fusiona con la etapa 5 "andén"
      Object.values(parsed.isos||{}).forEach(iso=>{
        if(iso.stage==='entregado'){
          iso.stage='anden';
          iso.data=iso.data||{};
          iso.data.anden=iso.data.anden||{};
          if(!iso.data.anden.vehAsignado && iso.data.entregado && iso.data.entregado.vehiculo){
            iso.data.anden.vehAsignado=iso.data.entregado.vehiculo;
          }
        }
      });
      return parsed;
    }
  }catch(e){}
  return{meta:{nextSeq:1},isos:{}};
}
function saveData(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(DATA));}
  catch(e){showToast('Error al guardar (storage lleno).');}
}
function loadUser(){try{return localStorage.getItem('ctrl-isos-user')||'';}catch(e){return'';}}
function saveUser(n){try{localStorage.setItem('ctrl-isos-user',(n||'').toUpperCase());}catch(e){}}

/* ══════════════════════════════════════════════════════════════
   SINCRONIZACIÓN CON GOOGLE SHEETS
   Modo A: google.script.run  (cuando la app corre en /exec)
   Modo B: fetch() GET        (cuando corre en GitHub Pages)
══════════════════════════════════════════════════════════════ */
const SYNC_URL     = 'https://script.google.com/macros/s/AKfycbyHtNA9w6ru2E253K7wXwhcGoFhgjVnvsf9C_ZHqOzKZtpngLNzRTAN0DOgE9l_zRc/exec';
const SYNC_POLL_MS = 20000;
const PENDING_KEY  = 'ctrl-isos-pending';
let pendingSync=[];
try{pendingSync=JSON.parse(localStorage.getItem(PENDING_KEY)||'[]');}catch(e){pendingSync=[];}

function queuePending(id){if(!pendingSync.includes(id)){pendingSync.push(id);localStorage.setItem(PENDING_KEY,JSON.stringify(pendingSync));}}
function clearPending(id){const i=pendingSync.indexOf(id);if(i>-1){pendingSync.splice(i,1);localStorage.setItem(PENDING_KEY,JSON.stringify(pendingSync));}}

function setSyncStatus(s){
  const el=document.getElementById('syncIndicator');if(!el)return;
  const map={
    off:    ['● Local','#BBD6EF'],
    syncing:['● Sincronizando…','#FFDB00'],
    ok:     ['● Sincronizado ✓','#7CE2A0'],
    error:  ['● Error servidor','#FF9FAE'],
    offline:['● Sin red','#FF9FAE'],
  };
  const[txt,color]=map[s]||map.off;
  el.textContent=txt;el.style.color=color;
}

/* Detecta si estamos dentro de Apps Script (/exec) */
const IS_GAS = (()=>{try{return typeof google!=='undefined'&&!!google.script?.run;}catch(e){return false;}})();

/* Llama al servidor — usa el método que corresponde al contexto */
async function callServer(fn, payload){
  if(IS_GAS){
    return new Promise((resolve,reject)=>{
      const runner=google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(err=>reject(new Error(err.message||String(err))));
      if(payload!==undefined) runner[fn](payload);
      else runner[fn]();
    });
  } else {
    const url=new URL(SYNC_URL);
    url.searchParams.set('fn',fn);
    if(payload!==undefined) url.searchParams.set('data',String(payload));
    const res=await fetch(url.toString(),{method:'GET',redirect:'follow',credentials:'omit'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const txt=await res.text();
    const m=txt.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('Sin respuesta JSON del servidor');
    return JSON.parse(m[0]);
  }
}

async function pushIso(iso){
  queuePending(iso.id);setSyncStatus('syncing');
  try{
    const r=await callServer('serverSave',JSON.stringify(iso));
    if(r&&r.ok){clearPending(iso.id);setSyncStatus('ok');}
    else{console.warn('serverSave:',r);setSyncStatus('error');}
  }catch(e){console.error('pushIso:',e.message);setSyncStatus('offline');}
}

function mergeRemote(list){
  let changed=false;
  (list||[]).forEach(r=>{
    if(!r?.id)return;
    const loc=DATA.isos[r.id];
    const rt=new Date(r.updatedAt||r.createdAt||0).getTime();
    const lt=loc?new Date(loc.updatedAt||loc.createdAt||0).getTime():-1;
    if(!loc||rt>lt){DATA.isos[r.id]=r;changed=true;}
  });
  if(changed){saveData();if(!modalOpen)renderAll();}
}

async function pullAll(){
  setSyncStatus('syncing');
  try{
    const r=await callServer('serverGetAll');
    if(r?.ok){mergeRemote(r.isos);setSyncStatus('ok');}
    else{console.warn('serverGetAll:',r);setSyncStatus('error');}
  }catch(e){console.error('pullAll:',e.message);setSyncStatus('offline');}
}

async function retryPending(){
  if(!pendingSync.length)return;
  for(const id of[...pendingSync]){const iso=DATA.isos[id];if(iso)await pushIso(iso);else clearPending(id);}
}

async function bulkImportAll(){
  const isos=Object.values(DATA.isos);
  if(!isos.length){showToast('No hay datos locales para subir.');return;}
  setSyncStatus('syncing');
  try{
    const BATCH=10;let total=0;
    for(let i=0;i<isos.length;i+=BATCH){
      const r=await callServer('serverBulk',JSON.stringify(isos.slice(i,i+BATCH)));
      if(r?.ok)total+=r.count||BATCH;else throw new Error(JSON.stringify(r));
    }
    showToast(`${total} ISOs subidos a Google Sheets ✓`);setSyncStatus('ok');
  }catch(e){console.error('bulkImport:',e.message);showToast('Error: '+e.message);setSyncStatus('error');}
}

/* ── utils ── */
function genCode(){const s=DATA.meta.nextSeq||1;DATA.meta.nextSeq=s+1;return'ISO-'+String(s).padStart(5,'0');}
function nowISO(){return new Date().toISOString();}
function fmtDT(iso){if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});}
function fmtDate(iso){if(!iso)return'—';return new Date(iso+'T00:00:00').toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'});}
function hoursSince(iso){if(!iso)return 0;return(Date.now()-new Date(iso).getTime())/36e5;}
function timeAgo(iso){const h=hoursSince(iso);if(h<1)return Math.round(h*60)+' min';if(h<48)return Math.round(h)+' h';return Math.round(h/24)+' d';}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}
function attachUppercase(scopeEl){
  scopeEl.querySelectorAll('input[type=text], textarea').forEach(el=>{
    el.addEventListener('input',()=>{
      const pos=el.selectionStart;
      el.value=el.value.toUpperCase();
      try{el.setSelectionRange(pos,pos);}catch(e){}
    });
  });
}
function urgencyOf(iso){
  if(iso.stage==='anulado'||iso.stage===FINAL_STAGE_KEY)return'ok';
  const cfg=URGENCY_HOURS[iso.stage];if(!cfg)return'ok';
  const h=hoursSince(iso.stageEnteredAt);return h>=cfg.danger?'danger':h>=cfg.warning?'warning':'ok';
}
function stageCfg(k){return STAGES.find(s=>s.key===k);}
function allIsos(){return Object.values(DATA.isos);}

function renderChips(){
  const wrap=document.getElementById('stagechips');
  wrap.innerHTML=STAGES.map(s=>{
    const count=allIsos().filter(i=>i.stage===s.key&&(s.key!==FINAL_STAGE_KEY||showEntregados||hoursSince(i.stageEnteredAt)<=24)).length;
    return`<div class="chip" data-scroll="${s.key}"><div class="cnum">${s.num}</div><div><div class="count">${count}</div><div class="lbl">${s.label}</div></div></div>`;
  }).join('');
  wrap.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
    const col=document.getElementById('col-'+c.dataset.scroll);if(col)col.scrollIntoView({behavior:'smooth',inline:'start',block:'nearest'});
  }));
}
function cardHtml(iso){
  const urg=urgencyOf(iso),l=iso.data.llegada||{},b=iso.data.bodega||{},a=iso.data.anden||{};
  let meta='';
  if(iso.stage==='bodega')meta=`Rack <b>${esc(b.rack||'—')}</b>`;
  else if(iso.stage==='anden')meta=`Andén <b>${esc(a.numeroAnden||'—')}</b>${a.vehAsignado?` · Veh <b>${esc(a.vehAsignado)}</b>`:''}`;
  else if(l.isoAso)meta=`ISO/ASO <b>${esc(l.isoAso)}</b>`;
  const tags=[];
  if(l.transportista)tags.push(esc(l.transportista));
  if(l.lpn)tags.push(`LPN: ${esc(l.lpn)}`);

  return`<div class="card urg-${urg}" data-id="${iso.id}">
    <div class="top-row"><span class="code">${iso.code}</span><span class="age">${timeAgo(iso.stageEnteredAt)}</span></div>

function visibleIsosForStage(stageKey){
  let list=allIsos().filter(i=>i.stage===stageKey);
  if(stageKey===FINAL_STAGE_KEY&&!showEntregados)list=list.filter(i=>hoursSince(i.stageEnteredAt)<=24);
  if(filterText){const f=filterText.toLowerCase();list=list.filter(i=>[i.code,i.data.llegada.isoAso,i.data.llegada.lpn,i.data.llegada.transportista,i.data.bodega&&i.data.bodega.rack].join(' ').toLowerCase().includes(f));}

function renderBoard(){

function fieldHtml(f,val){
  const req=f.required?'req':'';val=val!==undefined&&val!==null?val:'';
  if(f.type==='select')return`<div class="field"><label class="${req}">${f.label}</label><select name="${f.key}" ${f.required?'required':''}>${f.options.map(o=>`<option value="${esc(o)}" ${o===val?'selected':''}>${o===''?'— Seleccionar —':esc(o)}</option>`).join('')}</select></div>`;
  if(f.type==='textarea')return`<div class="field"><label class="${req}">${f.label}</label><textarea name="${f.key}" ${f.required?'required':''}>${esc(val)}</textarea></div>`;
  return`<div class="field"><label class="${req}">${f.label}</label><input type="${f.type}" name="${f.key}" value="${esc(val)}" ${f.required?'required':''}></div>`;
}
function collectForm(form,fields){const out={};fields.forEach(f=>{const el=form.elements[f.key];let v=el?el.value.trim():'';if(el&&(f.type==='text'||f.type==='textarea'))v=v.toUpperCase();out[f.key]=v;});return out;}

function openNewModal(){
  modalOpen=true;
  const modal=document.getElementById('modal'),user=loadUser();

    <div class="field"><label class="req">${RESPONSABLE_LABELS.llegada}</label><input type="text" name="responsable" value="${esc(user)}" required placeholder="Nombre del receptor"></div></div>
    <div class="modal-foot"><button type="button" class="btn btn-outline" id="cancelBtn">Cancelar</button><button type="submit" class="btn btn-primary">Registrar llegada</button></div></form>`;
  document.getElementById('overlay').classList.add('show');
  attachUppercase(modal);

function onSubmitNew(e){
  e.preventDefault();

  if(!responsable){showToast('Indica quién recepciona.');return;}
  const id='i_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),code=genCode(),ts=nowISO();
  DATA.isos[id]={id,code,stage:'llegada',stageEnteredAt:ts,createdAt:ts,updatedAt:ts,
    data:{llegada:llegadaData,recepcion:{},bodega:{},retiro:{},anden:{}},

  saveData();saveUser(responsable);closeModal();renderAll();showToast(`${code} registrado en Llegada`);

function timelineHtml(iso){
  const lf=k=>k==='anulado'?'Anulado':(stageCfg(k)?.full||k);
  return`<div class="timeline"><h3>Historial</h3>${iso.history.map(h=>`<div class="tl-item ${h.stage==='anulado'?'is-anulado':''}"><div class="tl-dot"></div><div class="tl-content"><span class="stg">${lf(h.stage)}</span> — ${esc(h.responsable||'—')}<div class="when">${fmtDT(h.fecha)}</div>${h.notas?`<div class="notas">${esc(h.notas)}</div>`:''}</div></div>`).join('')}</div>`;

function openDetail(id){
  const iso=DATA.isos[id];if(!iso)return;
  modalOpen=true;
  const modal=document.getElementById('modal'),user=loadUser();
  const isAnulado=iso.stage==='anulado';
  const nextStage=isAnulado?null:STAGES[STAGES.findIndex(x=>x.key===iso.stage)+1];
  const isFinal=!isAnulado&&!nextStage;
  const l=iso.data.llegada||{};
  let actionHtml='';
  if(!isAnulado&&!isFinal&&nextStage){
    const respLabel=RESPONSABLE_LABELS[nextStage.key]||'Quien recepciona';
    actionHtml=`<div class="modal-body" style="border-top:1px solid var(--line);padding-top:14px;">
      <div class="section-title">Avanzar a etapa ${nextStage.num} · ${nextStage.full}</div>
      ${FIELDS[nextStage.key].map(f=>fieldHtml(f)).join('')}
      <div class="field"><label class="req">${respLabel}</label><input type="text" name="responsable" value="${esc(user)}" required></div></div>`;
  }
  modal.innerHTML=`<div class="modal-head"><div><h2>${iso.code}</h2><div class="stage-tag">${l.isoAso?esc(l.isoAso)+' · ':''}${isAnulado?'Anulado':stageCfg(iso.stage).full}</div></div><button class="modal-close" id="closeBtn">✕</button></div>
    ${timelineHtml(iso)}<form id="advForm">${actionHtml}
    <div class="modal-foot"><div class="left-actions">${!isAnulado&&!isFinal?`<button type="button" class="btn-danger-text" id="anularBtn">Anular ISO</button>`:''}</div>
    <button type="button" class="btn btn-outline" id="cancelBtn">Cerrar</button>
    ${!isAnulado&&!isFinal&&nextStage?`<button type="submit" class="btn btn-primary">Avanzar →</button>`:''}</div></form>`;
  document.getElementById('overlay').classList.add('show');
  attachUppercase(modal);
  document.getElementById('closeBtn').addEventListener('click',closeModal);
  document.getElementById('cancelBtn').addEventListener('click',closeModal);
  const ab=document.getElementById('anularBtn');if(ab)ab.addEventListener('click',()=>onAnular(iso.id));
  if(nextStage&&!isAnulado&&!isFinal)document.getElementById('advForm').addEventListener('submit',e=>onAdvance(e,iso.id,nextStage.key));
}
function onAdvance(e,id,nextKey){
  e.preventDefault();
  const form=e.target,iso=DATA.isos[id];if(!iso)return;
  for(const f of FIELDS[nextKey]){if(f.required&&form.elements[f.key]&&!form.elements[f.key].value.trim()){showToast(`Completa: ${f.label}`);return;}}
  const stageData=collectForm(form,FIELDS[nextKey]),responsable=form.elements['responsable'].value.trim().toUpperCase();
  if(!responsable){showToast('Indica quién recepciona.');return;}
  const ts=nowISO();
  iso.data[nextKey]=stageData;iso.stage=nextKey;iso.stageEnteredAt=ts;iso.updatedAt=ts;
  iso.history.push({stage:nextKey,fecha:ts,responsable,notas:stageData.notas||''});
  saveData();saveUser(responsable);closeModal();renderAll();showToast(`${iso.code} avanzó a ${stageCfg(nextKey).label}`);
  pushIso(iso);
}
function onAnular(id){
  const iso=DATA.isos[id];if(!iso)return;
  const ok=window.confirm?window.confirm(`¿Anular ${iso.code}?`):true;if(!ok)return;
  const motivo=(window.prompt?window.prompt('Motivo de anulación:'):'')||'';
  const responsable=loadUser()||(iso.history[iso.history.length-1]||{}).responsable||'';
  const ts=nowISO();
  iso.stage='anulado';iso.stageEnteredAt=ts;iso.updatedAt=ts;
  iso.history.push({stage:'anulado',fecha:ts,responsable,notas:motivo});
  saveData();closeModal();renderAll();showToast(`${iso.code} anulado`);
  pushIso(iso);
}
function closeModal(){
  modalOpen=false;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('modal').innerHTML='';
}

}

function calcKpis(){
  const isos=allIsos();
  const total=isos.length;
  const activos=isos.filter(i=>![FINAL_STAGE_KEY,'anulado'].includes(i.stage)).length;
  const entregadosHoy=isos.filter(i=>i.stage===FINAL_STAGE_KEY&&hoursSince(i.stageEnteredAt)<=24).length;
  const entregados7d=isos.filter(i=>i.stage===FINAL_STAGE_KEY&&hoursSince(i.stageEnteredAt)<=168).length;
  const anulados=isos.filter(i=>i.stage==='anulado').length;

  // Tiempo promedio ciclo (llegada → andén / etapa final) en horas
  const completados=isos.filter(i=>i.stage===FINAL_STAGE_KEY);
  let avgCiclo=0;
  if(completados.length){
    const suma=completados.reduce((acc,i)=>{
      const t0=new Date(i.createdAt).getTime();
      const t1=new Date(i.stageEnteredAt).getTime();
      return acc+(t1-t0)/36e5;
    },0);
    avgCiclo=suma/completados.length;
  }

  // Por etapa
  const byStage={};
  STAGES.forEach(s=>{
    const list=isos.filter(i=>i.stage===s.key);
    const warns=list.filter(i=>urgencyOf(i)==='warning').length;
    const dangs=list.filter(i=>urgencyOf(i)==='danger').length;
    let avgH=0;
    if(list.length){
      const suma=list.reduce((acc,i)=>acc+hoursSince(i.stageEnteredAt),0);
      avgH=suma/list.length;
    }
    byStage[s.key]={count:list.length,warning:warns,danger:dangs,avgH};
  });

  // Motivos más comunes
  const motivoCounts={};
  isos.forEach(i=>{const m=(i.data.llegada||{}).motivo;if(m){motivoCounts[m]=(motivoCounts[m]||0)+1;}});
  const motivos=Object.entries(motivoCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Conductores que más retornan ISOs
  const condCounts={};
  isos.forEach(i=>{const c=(i.data.llegada||{}).conductorOrigen;if(c){condCounts[c]=(condCounts[c]||0)+1;}});
  const conductores=Object.entries(condCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  return{total,activos,entregadosHoy,entregados7d,anulados,avgCiclo,byStage,motivos,conductores};
}

function fmtH(h){if(h<1)return Math.round(h*60)+' min';if(h<48)return Math.round(h)+' h';return(h/24).toFixed(1)+' d';}

function renderDashboard(){
  const kpi=calcKpis();
  const body=document.getElementById('dbBody');

  // Porcentaje ciclo completado
  const pct=kpi.total>0?Math.round(kpi.entregados7d/kpi.total*100):0;

  // Global
  const globalHtml=`
    <div class="db-global">
      <div class="kpi-global"><div class="kg-label">Total registrados</div><div class="kg-val c-accent">${kpi.total}</div><div class="kg-sub">Todos los ISOs en el sistema</div></div>
      <div class="kpi-global"><div class="kg-label">En proceso activo</div><div class="kg-val">${kpi.activos}</div><div class="kg-sub">Sin incluir finalizados ni anulados</div></div>
      <div class="kpi-global"><div class="kg-label">Finalizados · 24 h</div><div class="kg-val c-success">${kpi.entregadosHoy}</div><div class="kg-sub">${kpi.entregados7d} en los últimos 7 días</div></div>
      <div class="kpi-global"><div class="kg-label">Anulados</div><div class="kg-val c-danger">${kpi.anulados}</div><div class="kg-sub">Mermas, duplicados u errores</div></div>
      <div class="kpi-global"><div class="kg-label">Tiempo prom. ciclo</div><div class="kg-val ${kpi.avgCiclo>48?'c-danger':kpi.avgCiclo>24?'c-warning':'c-success'}">${kpi.avgCiclo>0?fmtH(kpi.avgCiclo):'—'}</div><div class="kg-sub">Llegada → andén / vehículo asignado</div></div>
      <div class="kpi-global"><div class="kg-label">Tasa de completitud</div><div class="kg-val c-accent">${pct}%</div><div class="kg-sub">Finalizados / total (7 días)</div></div>
    </div>`;

  // Flujo
  const totalActivos=STAGES.reduce((s,st)=>s+kpi.byStage[st.key].count,0)||1;
  const segColors=['s1','s2','s3','s4','s5'];
  const segs=STAGES.map((st,i)=>{
    const cnt=kpi.byStage[st.key].count;
    const flex=Math.max(cnt/totalActivos*100,cnt>0?4:0.5);
    return`<div class="flow-seg ${segColors[i]}" style="flex:${flex}" title="${st.label}: ${cnt}">${cnt>0?cnt+' · '+st.label:''}</div>`;
  }).join('');
  const flowHtml=`
    <div class="db-flow-section">
      <div class="db-section-label">Distribución actual en el flujo</div>
      <div class="flow-bar">${segs}</div>
      <div class="flow-legend">${STAGES.map((st,i)=>`<div class="flow-leg-item"><div class="flow-leg-dot ${segColors[i]}" style="background:${['#1A5EA8','#1269C0','#2978D4','#3B87E0','#1F8A4C'][i]}"></div><span>${st.label} (${kpi.byStage[st.key].count})</span></div>`).join('')}</div>
    </div>`;

  // Por etapa
  const maxAvg=Math.max(...STAGES.map(s=>kpi.byStage[s.key].avgH),1);
  const stagesHtml=`
    <div class="db-section-label">KPI por etapa del proceso</div>
    <div class="db-stages">${STAGES.map(s=>{
      const d=kpi.byStage[s.key];
      const hasDanger=d.danger>0,hasWarning=d.warning>0&&!hasDanger;
      const cls=hasDanger?'kpi-stage has-danger':hasWarning?'kpi-stage has-warning':'kpi-stage';
      const avgBarPct=maxAvg>0?Math.min(d.avgH/maxAvg*100,100):0;
      return`<div class="${cls}">
        <div class="ks-head"><div class="ks-num">${s.num}</div><div class="ks-name">${s.label}</div></div>
        <div class="ks-total">${d.count}</div>
        <div class="ks-metrics">
          <div class="ks-met">
            <div class="m-val ${d.danger>0?'c-danger':d.warning>0?'c-warning':'c-success'}">${d.danger+d.warning}</div>
            <div class="m-lbl">En alerta</div>
          </div>
          <div class="ks-met">
            <div class="m-val">${d.avgH>0?fmtH(d.avgH):'—'}</div>
            <div class="m-lbl">Tiempo prom.</div>
          </div>
        </div>
        <div class="ks-avgbar"><div class="ks-avgbar-fill" style="width:${avgBarPct}%"></div></div>
      </div>`;
    }).join('')}</div>`;

  // Bottom
  const maxMot=kpi.motivos.length?kpi.motivos[0][1]:1;
  const motivosHtml=kpi.motivos.length?kpi.motivos.map(([m,n])=>
    `<div class="motivo-row"><span class="motivo-label">${esc(m)}</span><div class="motivo-bar-wrap"><div class="motivo-bar" style="width:${n/maxMot*100}%"></div></div><span class="motivo-cnt">${n}</span></div>`
  ).join(''):`<div class="db-empty-msg">Sin datos de motivos aún</div>`;

  const conductoresHtml=kpi.conductores.length?kpi.conductores.map(([c,n])=>
    `<div class="conductor-row"><span class="conductor-name">${esc(c)}</span><span class="conductor-badge">${n}</span></div>`
  ).join(''):`<div class="db-empty-msg">Sin datos de conductores aún</div>`;

  const bottomHtml=`
    <div class="db-bottom">
      <div class="db-panel"><h3>Motivos de devolución</h3>${motivosHtml}</div>
      <div class="db-panel"><h3>Conductores · más ISOs retornados</h3>${conductoresHtml}</div>
    </div>`;

  // Buscador de fase
  const searchBarHtml=`
    <div class="db-search-wrap" style="margin-bottom:22px;">
      <div class="db-section-label">Buscar ISO / ASO — ¿en qué fase está?</div>
      <div class="db-search-row">
        <div class="db-search-box">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6FA0CC" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="dbSearchInput" type="text" placeholder="Código ISO-00001 o número ISO/ASO…" autocomplete="off">
        </div>
      </div>
      <div id="dbSearchResult"></div>
    </div>`;

  // Historial completo (lista desplegable)
  const historyHtml=`
    <div class="db-history-wrap">
      <details class="db-history" id="dbHistoryDetails">
        <summary>
          <span class="dh-summary-left">📋 Historial completo de ISOs <span class="dh-count" id="dbHistoryCount">${allIsos().length}</span></span>
          <span class="dh-chevron">▾</span>
        </summary>
        <div class="db-history-inner">
          <div class="db-history-filter">
            <input id="dbHistoryFilterInput" type="text" placeholder="Filtrar por código, ISO/ASO o transportista…" autocomplete="off">
          </div>
          <div class="dh-head-row">
            <div class="dh-col-code">N° ISO</div>
            <div class="dh-col-date">Fecha de recepción</div>
            <div class="dh-col-stage">Proceso actual</div>
          </div>
          <div class="db-history-list" id="dbHistoryListBody"></div>
        </div>
      </details>
    </div>`;

  body.innerHTML=searchBarHtml+globalHtml+flowHtml+stagesHtml+bottomHtml+historyHtml;
  // re-bind search after render
  bindDbSearch();
  bindDbHistory();
}

/* ── historial completo (lista desplegable) ── */
function stageBadgeColor(k){
  const colors={llegada:'#1A5EA8',recepcion:'#1269C0',bodega:'#2978D4',retiro:'#3B87E0',anden:'#1F8A4C',anulado:'#D7263D'};
  return colors[k]||'#888';
}
function stageBadgeLabel(k){return k==='anulado'?'Anulado':(stageCfg(k)?.label||k);}
function buildDbHistoryRows(){
  let list=allIsos().slice();
  if(dbHistoryFilter){
    const f=dbHistoryFilter.toLowerCase();
    list=list.filter(i=>[i.code,(i.data.llegada||{}).isoAso,(i.data.llegada||{}).transportista].join(' ').toLowerCase().includes(f));
  }
  list.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  return list;
}
function renderDbHistoryList(){
  const wrap=document.getElementById('dbHistoryListBody');
  if(!wrap)return;
  const list=buildDbHistoryRows();
  const countEl=document.getElementById('dbHistoryCount');
  if(countEl)countEl.textContent=list.length;
  if(!list.length){
    wrap.innerHTML=`<div class="dh-empty">No hay ISOs que coincidan con la búsqueda.</div>`;
    return;
  }
  wrap.innerHTML=list.map(iso=>{
    const l=iso.data.llegada||{};
    const sc=stageBadgeColor(iso.stage);
    return`<div class="dh-row">
      <div class="dh-col-code">${iso.code}${l.isoAso?`<span class="dh-isoaso">${esc(l.isoAso)}</span>`:''}</div>
      <div class="dh-col-date">${fmtDT(iso.createdAt)}</div>
      <div class="dh-col-stage"><span class="dh-badge" style="background:${sc}">${stageBadgeLabel(iso.stage)}</span></div>
    </div>`;
  }).join('');
}
function bindDbHistory(){
  renderDbHistoryList();
  const det=document.getElementById('dbHistoryDetails');
  if(det){
    det.open=dbHistoryOpen;
    det.addEventListener('toggle',()=>{dbHistoryOpen=det.open;});
  }
  const hf=document.getElementById('dbHistoryFilterInput');
  if(hf){
    hf.value=dbHistoryFilter;
    hf.addEventListener('input',e=>{dbHistoryFilter=e.target.value;renderDbHistoryList();});
  }
}

function bindDbSearch(){
  const inp=document.getElementById('dbSearchInput');
  if(!inp)return;
  inp.addEventListener('input',e=>runDbSearch(e.target.value.trim()));
}
function runDbSearch(q){
  const out=document.getElementById('dbSearchResult');
  if(!out)return;
  if(!q){out.innerHTML='';return;}
  const ql=q.toLowerCase();
  const found=allIsos().filter(i=>{
    return i.code.toLowerCase().includes(ql)||
      ((i.data.llegada||{}).isoAso||'').toLowerCase().includes(ql);
  });
  if(!found.length){
    out.innerHTML=`<div class="db-search-none">No se encontraron ISOs con ese código o número.</div>`;
    return;
  }
  const stageLabel=k=>k==='anulado'?'Anulado':(stageCfg(k)?.full||k);
  const stageNum=k=>{const s=stageCfg(k);return s?s.num:'—';};
  const stageColors={llegada:'#1A5EA8',recepcion:'#1269C0',bodega:'#2978D4',retiro:'#3B87E0',anden:'#1F8A4C',anulado:'#D7263D'};
  out.innerHTML=found.map(iso=>{
    const l=iso.data.llegada||{},b=iso.data.bodega||{},a=iso.data.anden||{};
    const urg=urgencyOf(iso);
    const urgLabel={ok:'',warning:'⚠ En alerta',danger:'🔴 Crítico'}[urg];
    const sc=stageColors[iso.stage]||'#888';
    const sn=stageNum(iso.stage);
    const extras=[];
    if(l.transportista)extras.push(esc(l.transportista));
    if(l.lpn)extras.push(`LPN: ${esc(l.lpn)}`);
    if(l.motivo)extras.push(esc(l.motivo));
    if(b.rack)extras.push(`Rack: ${esc(b.rack)}`);
    if(a.vehAsignado)extras.push(`Veh: ${esc(a.vehAsignado)}`);
    return`<div class="db-search-card">
      <div class="dsc-left" style="border-left-color:${sc}">
        <div class="dsc-code">${iso.code}${l.isoAso?' · '+esc(l.isoAso):''}</div>
        <div class="dsc-stage">
          <span class="dsc-bubble" style="background:${sc}">${sn}</span>
          <span class="dsc-stagename">${stageLabel(iso.stage)}</span>
          ${urgLabel?`<span class="dsc-urg">${urgLabel}</span>`:''}
        </div>
        ${extras.length?`<div class="dsc-extras">${extras.join(' · ')}</div>`:''}
      </div>
      <div class="dsc-right">
        <div class="dsc-time-lbl">En esta etapa</div>
        <div class="dsc-time-val">${timeAgo(iso.stageEnteredAt)}</div>
        <div class="dsc-history">${iso.history.length} movimiento${iso.history.length!==1?'s':''}</div>
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════════
   EXPORT CSV
══════════════════════════════════════════════ */
function exportCSV(){
  const rows=[['Código','ISO/ASO','Empresa transportista','Cantidad LPN','Motivo no entrega','Conductor origen','Estado producto','Rack / Ubicación zona repisas','N° andén','Veh asignado','Etapa actual','Fecha llegada','Última actualización']];
  allIsos().forEach(i=>{
    const l=i.data.llegada||{},r=i.data.recepcion||{},b=i.data.bodega||{},a=i.data.anden||{};
    rows.push([i.code,l.isoAso||'',l.transportista||'',l.lpn||'',l.motivo||'',l.conductorOrigen||'',r.estadoProducto||'',b.rack||'',a.numeroAnden||'',a.vehAsignado||'',i.stage,i.createdAt,i.stageEnteredAt]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`control-isos-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
function init(){
  setLoading(60);
  DATA=loadData();
  setLoading(100);setTimeout(()=>setLoading(0),400);
  renderAll();

  document.getElementById('btnNew').addEventListener('click',openNewModal);
  document.getElementById('btnDashboard').addEventListener('click',()=>{if(dbUnlocked)openDashboard();else openPin();});
  document.getElementById('btnExport').addEventListener('click',exportCSV);
  document.getElementById('searchInput').addEventListener('input',e=>{filterText=e.target.value;renderBoard();});
  document.getElementById('chkShowEntregados').addEventListener('change',e=>{showEntregados=e.target.checked;renderAll();});
  document.getElementById('chkShowAnulados').addEventListener('change',e=>{showAnulados=e.target.checked;renderBoard();});
  document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

  // PIN keypad
  document.getElementById('pinKeypad').addEventListener('click',e=>{
    const k=e.target.dataset.k;if(k!==undefined)pinKey(k);
  });
  document.getElementById('pinDel').addEventListener('click',pinDel);
  document.getElementById('pinCancel').addEventListener('click',closePin);

  // Dashboard close
  document.getElementById('btnCloseDashboard').addEventListener('click',closeDashboard);

  // Teclado físico en PIN
  document.addEventListener('keydown',e=>{
    if(!document.getElementById('pinOverlay').classList.contains('show'))return;
    if(e.key>='0'&&e.key<='9')pinKey(e.key);
    if(e.key==='Backspace')pinDel();
    if(e.key==='Escape')closePin();
  });

  const btnSync=document.getElementById('btnBulkSync');
  if(btnSync)btnSync.addEventListener('click',bulkImportAll);
  const btnSetup=document.getElementById('btnSetupSheets');
  if(btnSetup)btnSetup.addEventListener('click',setupSheets);

  initSync();
}

init();
})();
</script>
